name: Databricks CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

# =========================
# DEV DEPLOYMENT
# =========================
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
      WORKSPACE_PATH: "/Users/rkhridoyinfo@gmail.com/Student_Development_Pipeline"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Databricks CLI
        run: pip install databricks-cli

      # ✅ Configure CLI (non-interactive)
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg

      # ✅ Create folder if not exists (IMPORTANT)
      - name: Create workspace directory
        run: |
          databricks workspace mkdirs "$WORKSPACE_PATH"

      # ✅ Deploy notebooks
      - name: Deploy notebooks to DEV
        run: |
          databricks workspace import_dir ./Workspace "$WORKSPACE_PATH" --overwrite


# =========================
# PROD DEPLOYMENT
# =========================
  deploy-prod:
    name: Deploy to PROD
    needs: deploy-dev
    runs-on: ubuntu-latest

    environment:
      name: prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
      WORKSPACE_PATH: "/Users/rkhridoyinfo@gmail.com/Student_Production_Pipeline"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          echo "[DEFAULT]" > ~/.databrickscfg
          echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
          echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg

      - name: Create workspace directory
        run: |
          databricks workspace mkdirs "$WORKSPACE_PATH"

      - name: Deploy notebooks to PROD
        run: |
          databricks workspace import_dir ./Workspace "$WORKSPACE_PATH" --overwrite